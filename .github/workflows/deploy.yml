name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js with npm cache
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies (clean install for reproducibility)
      - name: Install dependencies
        run: npm ci

      # 4. Build for production with the correct base-href for GitHub Pages
      - name: Build
        run: |
          npx ng build --configuration production \
            --base-href "/piano-ear-trainer/"

      # 5. Deploy the built output to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/piano-ear-trainer/browser
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
